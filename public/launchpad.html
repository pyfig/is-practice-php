<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad - Project Dashboard</title>
    <style>
        :root {
            /* macOS Color Palette */
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-mid: #16213e;
            --bg-gradient-end: #0f3460;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent-blue: #007AFF;
            --accent-blue-hover: #0051D5;
            --accent-purple: #AF52DE;
            --accent-green: #34C759;
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
            --accent-teal: #5AC8FA;
            --accent-indigo: #5856D6;
            --accent-pink: #FF2D55;
            --accent-yellow: #FFCC00;
            
            /* Spacing Scale */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;
            --space-3xl: 4rem;
            
            /* Shadows */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.25);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.35);
            --shadow-glow: 0 0 40px rgba(255, 255, 255, 0.1);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.05);
            --shadow-card-hover: 0 8px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 50%;
            
            /* Typography */
            --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", SFMono-Regular, Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .launchpad-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: var(--space-lg) var(--space-xl);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-md);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-lg);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header-brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .header-brand-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: var(--space-md);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .search-input {
            width: 100%;
            padding: var(--space-md) var(--space-md) var(--space-md) 3rem;
            font-size: 1rem;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            outline: none;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-sm);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--glass-highlight);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.25), var(--shadow-md);
        }

        .search-input:focus + .search-icon,
        .search-container:focus-within .search-icon {
            color: var(--accent-blue);
        }

        .search-clear {
            position: absolute;
            right: var(--space-sm);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-fast);
        }

        .search-clear:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .search-clear:focus {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }

        .search-clear.visible {
            opacity: 1;
            visibility: visible;
        }

        .search-clear svg {
            width: 14px;
            height: 14px;
        }

        .search-results-info {
            position: absolute;
            top: calc(100% + var(--space-sm));
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            opacity: 0;
            transform: translateY(-10px);
            transition: all var(--transition-normal);
            pointer-events: none;
        }

        .search-results-info.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .launchpad-main {
            padding-top: 180px;
            padding-bottom: var(--space-3xl);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .launchpad-content {
            width: 100%;
            max-width: 1200px;
            padding: 0 var(--space-xl);
        }

        .launchpad-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: var(--space-2xl);
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--space-xl);
            justify-items: center;
            padding: var(--space-lg) 0;
        }

        @media (min-width: 640px) {
            .project-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: var(--space-2xl);
            }
        }

        @media (min-width: 1024px) {
            .project-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        .project-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            padding: var(--space-md);
            border-radius: var(--radius-lg);
            transition: all var(--transition-normal);
            cursor: pointer;
            position: relative;
            background: transparent;
            border: none;
            width: 100%;
            max-width: 180px;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            opacity: 0;
            transform: scale(0.9);
            transition: all var(--transition-normal);
            z-index: -1;
        }

        .project-card:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .project-card:hover {
            transform: translateY(-4px);
        }

        .project-card:hover .project-icon {
            transform: scale(1.05);
            box-shadow: var(--shadow-card-hover);
        }

        .project-card:active {
            transform: scale(0.96) translateY(0);
        }

        .project-card:active .project-icon {
            transform: scale(0.95);
        }

        .project-card:focus {
            outline: none;
        }

        .project-card:focus::before {
            opacity: 1;
            transform: scale(1);
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .project-card:focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 4px;
        }

        .project-icon {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 600;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            box-shadow: var(--shadow-card);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .project-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, transparent 50%);
            border-radius: inherit;
        }

        @media (min-width: 640px) {
            .project-icon {
                width: 96px;
                height: 96px;
                font-size: 2.25rem;
            }
        }

        @media (min-width: 1024px) {
            .project-icon {
                width: 104px;
                height: 104px;
                font-size: 2.5rem;
            }
        }

        .icon-blue { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .icon-purple { background: linear-gradient(135deg, #AF52DE, #5856D6); }
        .icon-green { background: linear-gradient(135deg, #34C759, #30D158); }
        .icon-orange { background: linear-gradient(135deg, #FF9500, #FF6B00); }
        .icon-red { background: linear-gradient(135deg, #FF3B30, #FF6B6B); }
        .icon-teal { background: linear-gradient(135deg, #5AC8FA, #64D2FF); }
        .icon-indigo { background: linear-gradient(135deg, #5856D6, #6366F1); }
        .icon-pink { background: linear-gradient(135deg, #FF2D55, #FF6B9D); }
        .icon-yellow { background: linear-gradient(135deg, #FFCC00, #FFD700); }
        .icon-cyan { background: linear-gradient(135deg, #00C7BE, #32ADE6); }

        .project-info {
            margin-top: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            width: 100%;
        }

        .project-name {
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.3;
            color: var(--text-primary);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            word-wrap: break-word;
            max-width: 100%;
        }

        @media (min-width: 640px) {
            .project-name {
                font-size: 1rem;
            }
        }

        .project-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.3;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--space-3xl) var(--space-xl);
            text-align: center;
            animation: fadeIn var(--transition-slow) ease-out;
        }

        .empty-state.visible {
            display: flex;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            margin-bottom: var(--space-lg);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }

        .empty-state-icon svg {
            width: 40px;
            height: 40px;
            color: var(--text-muted);
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }

        .empty-state-message {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        .empty-state-clear {
            margin-top: var(--space-lg);
            padding: var(--space-sm) var(--space-lg);
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--accent-blue);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            backdrop-filter: blur(10px);
        }

        .empty-state-clear:hover {
            background: rgba(0, 122, 255, 0.15);
            border-color: var(--accent-blue);
            transform: translateY(-1px);
        }

        .empty-state-clear:focus {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card {
            animation: scaleIn var(--transition-slow) ease-out backwards;
        }

        .project-card:nth-child(1) { animation-delay: 0ms; }
        .project-card:nth-child(2) { animation-delay: 30ms; }
        .project-card:nth-child(3) { animation-delay: 60ms; }
        .project-card:nth-child(4) { animation-delay: 90ms; }
        .project-card:nth-child(5) { animation-delay: 120ms; }
        .project-card:nth-child(6) { animation-delay: 150ms; }
        .project-card:nth-child(7) { animation-delay: 180ms; }
        .project-card:nth-child(8) { animation-delay: 210ms; }
        .project-card:nth-child(9) { animation-delay: 240ms; }
        .project-card:nth-child(10) { animation-delay: 270ms; }
        .project-card:nth-child(11) { animation-delay: 300ms; }
        .project-card:nth-child(12) { animation-delay: 330ms; }

        .project-card.hidden {
            display: none;
        }

        .project-card.matching {
            animation: scaleIn var(--transition-normal) ease-out;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (prefers-contrast: high) {
            :root {
                --glass-bg: rgba(255, 255, 255, 0.2);
                --glass-border: rgba(255, 255, 255, 0.4);
                --text-muted: rgba(255, 255, 255, 0.8);
            }
        }

        /* Focus visible for keyboard navigation */
        :focus:not(:focus-visible) {
            outline: none;
        }

        :focus-visible {
            outline: 2px solid var(--accent-blue);
            outline-offset: 2px;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .launchpad-header {
                padding: var(--space-md) var(--space-md);
            }

            .header-content {
                gap: var(--space-md);
            }

            .header-brand {
                font-size: 1.25rem;
            }

            .header-brand-icon {
                width: 28px;
                height: 28px;
            }

            .header-brand-icon svg {
                width: 16px;
                height: 16px;
            }

            .search-container {
                max-width: 100%;
            }

            .search-input {
                font-size: 16px; /* Prevent zoom on iOS */
                padding: var(--space-sm) var(--space-sm) var(--space-sm) 2.5rem;
            }

            .search-icon {
                left: var(--space-sm);
                width: 18px;
                height: 18px;
            }

            .launchpad-main {
                padding-top: 140px;
                padding-bottom: var(--space-xl);
            }

            .launchpad-content {
                padding: 0 var(--space-md);
            }

            .launchpad-title {
                font-size: 1.5rem;
                margin-bottom: var(--space-lg);
            }

            .project-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-md);
                padding: var(--space-md) 0;
            }

            .project-card {
                padding: var(--space-sm);
                max-width: none;
            }

            .project-icon {
                width: 56px;
                height: 56px;
                font-size: 1.25rem;
            }

            .project-info {
                margin-top: var(--space-sm);
            }

            .project-name {
                font-size: 0.75rem;
                font-weight: 600;
            }

            .project-subtitle {
                font-size: 0.625rem;
                -webkit-line-clamp: 1;
            }
        }

        @media (max-width: 480px) {
            .launchpad-header {
                padding: var(--space-sm) var(--space-sm);
            }

            .header-brand {
                font-size: 1.125rem;
            }

            .header-brand-icon {
                width: 24px;
                height: 24px;
            }

            .header-brand-icon svg {
                width: 14px;
                height: 14px;
            }

            .search-input {
                font-size: 16px;
                padding: var(--space-sm) var(--space-sm) var(--space-sm) 2.25rem;
            }

            .search-icon {
                width: 16px;
                height: 16px;
            }

            .launchpad-main {
                padding-top: 130px;
            }

            .launchpad-content {
                padding: 0 var(--space-sm);
            }

            .launchpad-title {
                font-size: 1.25rem;
                margin-bottom: var(--space-md);
            }

            .project-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-sm);
            }

            .project-card {
                padding: var(--space-xs);
            }

            .project-card::before {
                border-radius: var(--radius-md);
            }

            .project-icon {
                width: 48px;
                height: 48px;
                font-size: 1rem;
                border-radius: var(--radius-sm);
            }

            .project-info {
                margin-top: var(--space-xs);
                gap: 2px;
            }

            .project-name {
                font-size: 0.6875rem;
            }

            .project-subtitle {
                font-size: 0.5625rem;
            }

            .empty-state {
                padding: var(--space-xl) var(--space-md);
            }

            .empty-state-icon {
                width: 60px;
                height: 60px;
            }

            .empty-state-icon svg {
                width: 30px;
                height: 30px;
            }

            .empty-state-title {
                font-size: 1rem;
            }

            .empty-state-message {
                font-size: 0.875rem;
            }
        }

        @media (max-width: 360px) {
            .project-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-xs);
            }

            .project-icon {
                width: 56px;
                height: 56px;
                font-size: 1.125rem;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .project-card:hover {
                transform: none;
            }

            .project-card:hover .project-icon {
                transform: none;
                box-shadow: var(--shadow-card);
            }

            .project-card:active {
                transform: scale(0.95);
            }

            .project-card:active .project-icon {
                transform: scale(0.95);
            }

            .search-input:hover {
                background: var(--glass-bg);
                border-color: var(--glass-border);
            }
        }

        /* Safe area for notched phones */
        @supports (padding: max(0px)) {
            .launchpad-header {
                padding-left: max(var(--space-md), env(safe-area-inset-left));
                padding-right: max(var(--space-md), env(safe-area-inset-right));
            }

            .launchpad-main {
                padding-bottom: max(var(--space-xl), env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <header class="launchpad-header" role="banner">
        <div class="header-content">
            <div class="header-brand">
                <div class="header-brand-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span>Labs</span>
            </div>
            
            <div class="search-container" role="search">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Search projects..."
                        aria-label="Search projects by name"
                        autocomplete="off"
                    />
                    <button 
                        class="search-clear" 
                        id="searchClear"
                        aria-label="Clear search"
                        type="button"
                    >
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="search-results-info" id="searchResultsInfo" aria-live="polite"></div>
            </div>
        </div>
    </header>

    <main class="launchpad-main" role="main">
        <div class="launchpad-content">
            <h1 class="launchpad-title">Projects</h1>
            
            <div class="project-grid" id="projectGrid" role="list"></div>
            <div class="empty-state" id="emptyState" role="status" style="display:none">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <h2 class="empty-state-title">No projects found</h2>
                <p class="empty-state-message">We couldn't find any projects matching your search. Try a different keyword or clear your search.</p>
                <button class="empty-state-clear" id="emptyStateClear">Clear Search</button>
            </div>
        </div>
    </main>

    <script>
        const projects = [
            { id: 1, name: "Analytics", subtitle: "Data visualization dashboard", initials: "AN", color: "blue", url: "/projects/analytics" },
            { id: 2, name: "Calendar", subtitle: "Schedule and events", initials: "CA", color: "red", url: "/projects/calendar" },
            { id: 3, name: "Cloud Sync", subtitle: "File synchronization", initials: "CS", color: "teal", url: "/projects/cloud-sync" },
            { id: 4, name: "Design System", subtitle: "Component library", initials: "DS", color: "purple", url: "/projects/design-system" },
            { id: 5, name: "Email Client", subtitle: "Secure messaging", initials: "EM", color: "indigo", url: "/projects/email" },
            { id: 6, name: "Finance", subtitle: "Budget tracking", initials: "FI", color: "green", url: "/projects/finance" },
            { id: 7, name: "Gallery", subtitle: "Photo management", initials: "GA", color: "pink", url: "/projects/gallery" },
            { id: 8, name: "Help Center", subtitle: "Support articles", initials: "HC", color: "cyan", url: "/projects/help" },
            { id: 9, name: "Inventory", subtitle: "Stock management", initials: "IN", color: "orange", url: "/projects/inventory" },
            { id: 10, name: "Journal", subtitle: "Daily notes", initials: "JO", color: "yellow", url: "/projects/journal" },
            { id: 11, name: "Knowledge Base", subtitle: "Documentation", initials: "KB", color: "blue", url: "/projects/knowledge" },
            { id: 12, name: "Launcher", subtitle: "App dashboard", initials: "LA", color: "purple", url: "/projects/launcher" },
            { id: 13, name: "Messenger", subtitle: "Team chat", initials: "ME", color: "green", url: "/projects/messenger" },
            { id: 14, name: "Notes", subtitle: "Quick ideas", initials: "NO", color: "yellow", url: "/projects/notes" },
            { id: 15, name: "Projects", subtitle: "Task management", initials: "PR", color: "indigo", url: "/projects/projects" },
            { id: 16, name: "Reminders", subtitle: "Todo lists", initials: "RE", color: "orange", url: "/projects/reminders" },
            { id: 17, name: "Settings", subtitle: "Configuration", initials: "SE", color: "gray", colorClass: "icon-teal", url: "/projects/settings" },
            { id: 18, name: "Terminal", subtitle: "Command line", initials: "TE", color: "gray", colorClass: "icon-indigo", url: "/projects/terminal" },
            { id: 19, name: "Weather", subtitle: "Forecasts", initials: "WE", color: "cyan", url: "/projects/weather" },
            { id: 20, name: "Workspace", subtitle: "Collaboration hub", initials: "WO", color: "pink", url: "/projects/workspace" }
        ];

        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const searchResultsInfo = document.getElementById('searchResultsInfo');
        const projectGrid = document.getElementById('projectGrid');
        const emptyState = document.getElementById('emptyState');
        const emptyStateClear = document.getElementById('emptyStateClear');

        function renderProjects(projectsToRender) {
            projectGrid.innerHTML = projectsToRender.map((project, index) => `
                <a 
                    href="${project.url}" 
                    class="project-card" 
                    role="listitem"
                    data-project-id="${project.id}"
                    data-project-name="${project.name.toLowerCase()}"
                    aria-label="${project.name}: ${project.subtitle}"
                    style="animation-delay: ${index * 30}ms"
                >
                    <div class="project-icon ${project.colorClass || `icon-${project.color}`}">
                        ${project.initials}
                    </div>
                    <div class="project-info">
                        <span class="project-name">${escapeHtml(project.name)}</span>
                        <span class="project-subtitle">${escapeHtml(project.subtitle)}</span>
                    </div>
                </a>
            `).join('');
        }

        function filterProjects(query) {
            const normalizedQuery = query.toLowerCase().trim();
            const cards = projectGrid.querySelectorAll('.project-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const projectName = card.getAttribute('data-project-name');
                const isMatch = projectName.includes(normalizedQuery);
                
                if (isMatch) {
                    card.classList.remove('hidden');
                    card.classList.add('matching');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                    card.classList.remove('matching');
                }
            });

            // Toggle empty state
            if (visibleCount === 0 && normalizedQuery !== '') {
                emptyState.classList.add('visible');
                projectGrid.style.display = 'none';
            } else {
                emptyState.classList.remove('visible');
                projectGrid.style.display = 'grid';
            }

            // Update results info
            if (normalizedQuery !== '') {
                searchResultsInfo.textContent = `${visibleCount} project${visibleCount !== 1 ? 's' : ''} found`;
                searchResultsInfo.classList.add('visible');
            } else {
                searchResultsInfo.classList.remove('visible');
            }

            return visibleCount;
        }

        function clearSearch() {
            searchInput.value = '';
            searchClear.classList.remove('visible');
            filterProjects('');
            searchInput.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value;
            
            // Toggle clear button
            if (query.length > 0) {
                searchClear.classList.add('visible');
            } else {
                searchClear.classList.remove('visible');
            }
            
            filterProjects(query);
        });

        searchClear.addEventListener('click', clearSearch);
        emptyStateClear.addEventListener('click', clearSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                clearSearch();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement !== searchInput) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderProjects(projects);
        });
    </script>
</body>
</html>
